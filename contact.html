<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto - Ezequiel Atsuri</title>
    <meta name="description" content="Ponte en contacto con Ezequiel Atsuri" />
    
    <!-- Google Fonts: Outfit and Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="icon" type="image/x-icon" href="assets/images/icono.png">
    
    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <!-- Prevent FOUC for Dark Mode -->
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <!-- Components -->
    <script src="assets/js/components/navbar.js"></script>
    <script src="assets/js/components/footer.js"></script>
</head>
<body class="bg-gray-50 text-slate-800 dark:bg-slate-900 dark:text-slate-200 transition-colors duration-300 font-sans">
    
    <!-- Navbar Component -->
    <app-navbar></app-navbar>

    <!-- Spacer -->
    <div class="h-16"></div>

    <!-- Main Content -->
    <main class="min-h-screen bg-gradient-to-br from-slate-50 to-blue-50 dark:from-slate-950 dark:to-slate-900 py-16 transition-colors duration-300">
        <div class="max-w-6xl mx-auto px-6">
            <div class="text-center mb-16 fade-in-up">
                <h1 class="text-5xl font-bold text-slate-800 dark:text-white mb-4 font-outfit">Contácta<span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-500 dark:from-blue-400 dark:to-indigo-400">me</span></h1>
                <div class="w-24 h-1.5 bg-gradient-to-r from-blue-600 to-indigo-500 rounded-full mx-auto"></div>
            </div>
            
            <div class="grid lg:grid-cols-2 gap-16">
                <!-- Información de contacto -->
                <div class="space-y-8 fade-in-up">
                    <div class="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-700 relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-2 h-full bg-gradient-to-b from-blue-500 to-indigo-500"></div>
                        <h2 class="text-3xl font-bold text-slate-800 dark:text-white mb-6 font-outfit">¡Hablemos!</h2>
                        <p class="text-lg text-slate-600 dark:text-slate-300 leading-relaxed mb-8">
                            ¿Tienes un proyecto en mente? ¿Quieres colaborar? 
                            No dudes en contactarme. Estoy siempre abierto a nuevas oportunidades 
                            y emocionado por escuchar sobre tus ideas.
                        </p>
                        
                        <div class="space-y-6">
                            <div class="group flex items-center p-6 bg-slate-50 dark:bg-slate-900 rounded-2xl border border-slate-100 dark:border-slate-800 hover:border-blue-200 dark:hover:border-blue-800 transition-colors">
                                <div class="w-14 h-14 bg-gradient-to-br from-blue-100 to-blue-200 dark:from-blue-900 dark:to-indigo-900 text-blue-600 dark:text-blue-400 rounded-xl flex items-center justify-center mr-5 shadow-sm group-hover:scale-110 transition-transform">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                                </div>
                                <div>
                                    <h3 class="font-semibold text-slate-800 dark:text-white">Email</h3>
                                    <p class="text-slate-500 dark:text-slate-400 mt-1">ezequielatsuri@gmail.com</p>
                                </div>
                            </div>
                            
                            <div class="group flex items-center p-6 bg-slate-50 dark:bg-slate-900 rounded-2xl border border-slate-100 dark:border-slate-800 hover:border-indigo-200 dark:hover:border-indigo-800 transition-colors">
                                <div class="w-14 h-14 bg-gradient-to-br from-indigo-100 to-indigo-200 dark:from-indigo-900 dark:to-purple-900 text-indigo-600 dark:text-indigo-400 rounded-xl flex items-center justify-center mr-5 shadow-sm group-hover:scale-110 transition-transform">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                </div>
                                <div>
                                    <h3 class="font-semibold text-slate-800 dark:text-white">Ubicación</h3>
                                    <p class="text-slate-500 dark:text-slate-400 mt-1">Oaxaca, Mexico</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Formulario de contacto -->
                <div class="fade-in-up" style="transition-delay: 200ms;">
                    <div class="bg-white dark:bg-slate-800 p-10 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-700">
                        <h2 class="text-3xl font-bold text-slate-800 dark:text-white mb-8 text-center font-outfit">Envíame un mensaje</h2>
                        
                        <!-- Mensajes de estado -->
                        <div id="status-message" class="hidden text-center mb-6 p-4 rounded-xl text-sm font-semibold"></div>
                        
                        <form id="contact-form" class="space-y-6">
                            <div class="grid md:grid-cols-2 gap-6">
                                <div>
                                    <label for="name" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Nombre</label>
                                    <input type="text" id="name" name="name" required
                                        class="w-full px-5 py-3.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 transition-all duration-300 outline-none"
                                        placeholder="Tu nombre completo">
                                </div>
                                
                                <div>
                                    <label for="email" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Email</label>
                                    <input type="email" id="email" name="email" required
                                        class="w-full px-5 py-3.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 transition-all duration-300 outline-none"
                                        placeholder="tu@email.com">
                                </div>
                            </div>
                            
                            <div>
                                <label for="subject" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Asunto</label>
                                <input type="text" id="subject" name="subject" required
                                    class="w-full px-5 py-3.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 transition-all duration-300 outline-none"
                                    placeholder="¿En qué puedo ayudarte?">
                            </div>
                            
                            <div>
                                <label for="message" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Mensaje</label>
                                <textarea id="message" name="message" required rows="5"
                                    class="w-full px-5 py-3.5 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 transition-all duration-300 resize-none outline-none"
                                    placeholder="Cuéntame sobre tu proyecto, ideas o cualquier consulta que tengas..."></textarea>
                            </div>
                            
                            <button type="submit" id="submit-button"
                                class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 disabled:opacity-70 disabled:cursor-not-allowed text-white font-bold py-4 px-8 rounded-xl transition-all duration-300 transform hover:-translate-y-1 shadow-lg shadow-blue-500/30 flex justify-center items-center gap-2">
                                Enviar Mensaje
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer Component -->
    <app-footer></app-footer>

    <!-- Scroll to Top Button -->
    <button id="scroll-to-top" class="fixed bottom-8 right-8 bg-blue-600 hover:bg-blue-500 text-white p-3 rounded-xl shadow-lg shadow-blue-500/30 transition-all duration-300 translate-y-20 opacity-0 pointer-events-none z-50 focus:ring-4 focus:ring-blue-300 dark:focus:ring-blue-800" aria-label="Volver arriba">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path>
        </svg>
    </button>

    <script src="assets/js/main.js"></script>
    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();

        // Initialize EmailJS
        (function() {
            emailjs.init('hpM4yiX_CynyfeJXl');
        })();

        // Contact form handling
        const contactForm = document.getElementById('contact-form');
        const submitButton = document.getElementById('submit-button');
        const statusMessage = document.getElementById('status-message');

        contactForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Show loading state
            submitButton.disabled = true;
            submitButton.innerHTML = 'Enviando... <svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';
            statusMessage.className = 'text-center mb-6 p-4 rounded-xl text-sm font-semibold bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 border border-blue-200 dark:border-blue-800/50';
            statusMessage.textContent = 'Enviando mensaje...';
            statusMessage.classList.remove('hidden');

            try {
                const formData = {
                    from_name: document.getElementById('name').value,
                    from_email: document.getElementById('email').value,
                    subject: document.getElementById('subject').value,
                    message: document.getElementById('message').value,
                    to_email: 'ezequielatsuri@gmail.com'
                };

                await emailjs.send('service_eicap4m', 'template_udg9a4j', formData);
                
                // Show success message
                statusMessage.className = 'text-center mb-6 p-4 rounded-xl text-sm font-semibold bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 border border-emerald-200 dark:border-emerald-800/50';
                statusMessage.textContent = '¡Mensaje enviado exitosamente! Te responderé pronto.';
                
                // Reset form
                contactForm.reset();
                
                // Hide success message after 5 seconds
                setTimeout(() => {
                    statusMessage.classList.add('hidden');
                }, 5000);
            } catch (error) {
                console.error('Error sending email:', error);
                statusMessage.className = 'text-center mb-6 p-4 rounded-xl text-sm font-semibold bg-rose-50 dark:bg-rose-900/30 text-rose-600 dark:text-rose-400 border border-rose-200 dark:border-rose-800/50';
                statusMessage.textContent = 'Error al enviar el mensaje. Inténtalo de nuevo más tarde.';
                
                // Hide error message after 5 seconds
                setTimeout(() => {
                    statusMessage.classList.add('hidden');
                }, 5000);
            } finally {
                submitButton.disabled = false;
                submitButton.innerHTML = 'Enviar Mensaje <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>';
            }
        });
    </script>
</body>
</html>
